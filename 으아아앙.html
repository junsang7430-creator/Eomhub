<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>엄준상봇</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
body{
  margin:0;
  font-family:system-ui;
  background:#111;
  color:#e5e5e5;
  display:flex;
  height:100vh;
}
.sidebar{
  width:240px;
  background:#171717;
  padding:12px;
  box-sizing:border-box;
}
.newchat{
  width:100%;
  padding:10px;
  background:#2f2f2f;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
  min-width:0;
}
.messages{
  flex:1;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.msg{
  display:flex;
  align-items:flex-start; /* 프로필 기준 아래로 글 쌓임 */
  gap:8px;
  max-width:80%;
}
.msg.user{
  justify-content:flex-start; /* 오른쪽 끝 */
}
.msg.ai{
  justify-content:flex-start; /* 왼쪽 끝 */
}
.msg.user .text{
  text-align:left;
  order:1;
}
.msg.ai .text{
  text-align:left;
  order:1;
}
.msg.user .avatar{
  order:0;
  margin-right:8px;
  background:#444;
}
.msg.ai .avatar{
  order:0;
  margin-right:8px;
  background:#10a37f;
}
.avatar{
  width:32px;
  height:32px;
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  flex-shrink:0;
  color:white;
}
.text{
  padding:2px 0;
  word-break:break-word;
  white-space:pre-wrap;
  line-height:1.4;
}
.text code{
  background:#1a1a1a;
  color:#ddd;
  padding:2px 6px;
  border-radius:4px;
}
.text pre{
  background:#1a1a1a;
  padding:8px;
  border-radius:6px;
  overflow:auto;
}
.input-area{
  padding:14px;
  border-top:1px solid #333;
}
.input-box{
  display:flex;
  gap:10px;
  background:#2f2f2f;
  padding:10px;
  border-radius:10px;
}
textarea{
  flex:1;
  background:transparent;
  border:none;
  color:white;
  outline:none;
  resize:none;
  font-family:inherit;
  line-height:1.4;
}
button{
  background:#10a37f;
  border:none;
  color:white;
  padding:10px 16px;
  border-radius:8px;
  cursor:pointer;
}
@media(max-width:700px){
  .sidebar{display:none;}
}
</style>
</head>
<body>

<div class="sidebar">
<button class="newchat" onclick="newChat()">+ 새 채팅</button>
</div>

<div class="chat">
  <div id="messages" class="messages"></div>
  <div class="input-area">
    <div class="input-box">
      <textarea id="input" placeholder="엄준상 봇에게"></textarea>
      <button onclick="send()">전송</button>
    </div>
  </div>
</div>

<script>
const API_KEY="AIzaSyBA8-gxBmOofwgmKXkK6ElBVRPBikdHkxg"; // 실제 API키 넣기
const MODEL="gemini-2.5-flash-lite"; // 원하는 모델

const input = document.getElementById("input");
const messages = document.getElementById("messages");

input.addEventListener("keydown", e=>{
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    send();
  }
});

function addMessage(text, type){
  let msg = document.createElement("div");
  msg.className = "msg " + type;
  let content = type==="ai" ? marked.parse(text) : text;
  msg.innerHTML = `
    <div class="avatar">${type==="user"?"나":"엄"}</div>
    <div class="text">${content}</div>
  `;
  messages.appendChild(msg);
  messages.scrollTop = messages.scrollHeight;
  return msg.querySelector(".text");
}

function newChat(){
  messages.innerHTML = "";
}

async function send(){
  let text = input.value.trim();
  if(!text) return;
  addMessage(text,"user");
  input.value="";
  let thinking = addMessage("생각중...","ai");

  try{
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent`,
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "X-goog-api-key":API_KEY
        },
        body:JSON.stringify({
          contents:[{parts:[{text:"markdown 사용, 한국어로 대답해. "+text}]}],
          generationConfig:{maxOutputTokens:400}
        })
      }
    );

    const data = await res.json();
    let ai = "응답 오류";

    if(data.candidates &&
       data.candidates[0] &&
       data.candidates[0].content &&
       data.candidates[0].content.parts){
      ai = data.candidates[0].content.parts[0].text;
    }else{
      ai = JSON.stringify(data);
    }

    thinking.innerHTML = marked.parse(ai);

  }catch(e){
    thinking.innerText="서버 오류";
  }
}
</script>

</body>
</html>
